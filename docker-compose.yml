version: '3.8'

services:
  pdf-extractor-poc:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pdf-extractor-poc
    ports:
      - "8007:8007"
    volumes:
      - ./Unified_PDF_Platform/uploads:/app/Unified_PDF_Platform/uploads
      - ./Unified_PDF_Platform/unified_outputs:/app/Unified_PDF_Platform/unified_outputs
      - .env:/app/.env
    environment:
      - PYTHONUNBUFFERED=1
      - PORT=8007
    restart: always

# Optional: Add a volume for the monitor database if persistence is needed
# volumes:
#   monitor-db:
